<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preços de Itens - Layout por Lista Expandida</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --surface: #0f1115;
      --surface-container: #1a1d24;
      --surface-container-high: #22262f;
      --primary: #10b981;
      --secondary: #f59e0b;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body class="bg-[#0f1115] text-zinc-300 font-['Inter'] min-h-screen flex">
  
  <div class="flex-1 p-6 lg:p-10 max-w-7xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-black text-white">Consulta de Preços</h1>
        <p class="text-zinc-400 text-sm mt-1">Layout v3: Lista Expandível (Accordions Top-Down)</p>
      </div>
    </div>

    <div class="flex gap-4 mb-8 bg-[#1a1d24] p-4 rounded-2xl shadow-lg border border-zinc-800">
      <select class="bg-transparent border border-zinc-700/50 rounded-lg p-3 text-sm text-white w-full outline-none focus:border-primary">
        <option>Categoria: Adagas</option>
      </select>
      <select class="bg-transparent border border-zinc-700/50 rounded-lg p-3 text-sm text-white w-full outline-none focus:border-primary">
        <option>Cidade: Bridgewatch</option>
      </select>
      <select class="bg-transparent border border-zinc-700/50 rounded-lg p-3 text-sm text-white w-full outline-none focus:border-primary">
        <option>Qualidade: Normal</option>
      </select>
      <button class="bg-[#10b981] text-[#0f1115] px-6 py-2 rounded-lg font-black shrink-0 hover:bg-emerald-400">
        BUSCAR
      </button>
    </div>

    <div class="space-y-4">
      <!-- Accordion Item -->
      <div class="bg-[#1a1d24] rounded-2xl border border-zinc-800 shadow-md">
        <!-- Header -->
        <div class="p-5 flex items-center justify-between cursor-pointer hover:bg-zinc-800/30 transition-colors rounded-2xl">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-[#22262f] rounded-lg p-1.5 shadow-inner shrink-0">
               <img src="https://render.albiononline.com/v1/item/T4_MAIN_DAGGER.png" class="w-full h-full object-contain" />
            </div>
            <div>
              <h3 class="text-lg font-black text-white">Sangra-letra</h3>
              <p class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider">Adagas (Uma Mão)</p>
            </div>
          </div>
          <div class="flex items-center gap-6">
            <div class="text-right hidden md:block">
              <span class="text-[10px] text-zinc-500 uppercase block font-bold tracking-widest">Maior Preço (T8.4)</span>
              <span class="text-sm font-black text-amber-500">2.450.000</span>
            </div>
            <span class="material-symbols-outlined text-zinc-500 transition-transform rotate-180">expand_more</span>
          </div>
        </div>
        
        <!-- Expanded Content -->
        <div class="border-t border-zinc-800 bg-[#0f1115]/50 p-6 rounded-b-2xl">
          <div class="space-y-4">
            <!-- Row for T4 -->
            <div class="flex items-center justify-between bg-[#1a1d24] border border-zinc-800/50 rounded-xl p-3">
              <div class="w-10 bg-zinc-800 text-center py-1 rounded font-black text-xs text-white shadow-sm">T4</div>
              
              <div class="flex flex-1 justify-around px-4">
                <div class="text-center group">
                  <div class="text-xs text-zinc-500 font-bold mb-1">.0</div>
                  <div class="text-sm font-black text-white group-hover:text-primary cursor-pointer">45.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">5m</div>
                </div>
                <!-- Divisoria -->
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center group">
                  <div class="text-xs text-[#10b981] font-bold mb-1">.1</div>
                  <div class="text-sm font-black text-white group-hover:text-[#10b981] cursor-pointer">52.190</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">12m</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center group">
                  <div class="text-xs text-blue-400 font-bold mb-1">.2</div>
                  <div class="text-sm font-black text-white group-hover:text-blue-400 cursor-pointer">71.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">Atual</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center group">
                  <div class="text-xs text-purple-400 font-bold mb-1">.3</div>
                  <div class="text-sm font-black text-white group-hover:text-purple-400 cursor-pointer">105.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">1h</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center group opacity-50">
                  <div class="text-xs text-amber-400 font-bold mb-1">.4</div>
                  <div class="text-sm font-black text-zinc-500">-</div>
                </div>
              </div>
            </div>

             <!-- Row for T5 -->
             <div class="flex items-center justify-between bg-[#1a1d24] border border-zinc-800/50 rounded-xl p-3">
              <div class="w-10 bg-zinc-800 text-center py-1 rounded font-black text-xs text-white shadow-sm">T5</div>
              
              <div class="flex flex-1 justify-around px-4">
                <div class="text-center">
                  <div class="text-sm font-black text-white hover:text-primary cursor-pointer">75.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">5m</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center">
                  <div class="text-sm font-black text-white hover:text-[#10b981] cursor-pointer">92.190</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">12m</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center">
                  <div class="text-sm font-black text-white hover:text-blue-400 cursor-pointer">121.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">Atual</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center">
                  <div class="text-sm font-black text-white hover:text-purple-400 cursor-pointer">205.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">1h</div>
                </div>
                <div class="w-px h-8 bg-zinc-800"></div>
                <div class="text-center">
                  <div class="text-sm font-black text-white hover:text-amber-400 cursor-pointer">850.000</div>
                  <div class="text-[8px] text-zinc-600 mt-0.5">2d</div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
