<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preços de Itens - Layout por Cards Múltiplos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --surface: #0f1115;
      --surface-container: #1a1d24;
      --surface-container-high: #22262f;
      --primary: #10b981;
      --secondary: #f59e0b;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body class="bg-[#0f1115] text-zinc-300 font-['Inter'] min-h-screen flex">
  
  <div class="flex-1 p-6 lg:p-10 max-w-7xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-black text-white">Consulta de Preços</h1>
        <p class="text-zinc-400 text-sm mt-1">Layout v2: Cards Agrupados (Visual por Item Base)</p>
      </div>
    </div>

    <div class="flex gap-4 mb-6">
      <div class="flex-1 bg-[#1a1d24] p-2 rounded-xl border border-zinc-800 flex items-center gap-2">
        <span class="material-symbols-outlined text-zinc-500 pl-2">search</span>
        <input type="text" placeholder="Buscar adaga..." class="bg-transparent border-none text-white w-full outline-none p-2 text-sm">
      </div>
      <select class="bg-[#1a1d24] border border-zinc-800 rounded-xl px-4 text-sm text-white focus:ring-1 outline-none">
        <option>Adagas</option>
      </select>
      <select class="bg-[#1a1d24] border border-zinc-800 rounded-xl px-4 text-sm text-white focus:ring-1 outline-none">
        <option>Bridgewatch</option>
      </select>
    </div>

    <div class="space-y-8">
      <!-- Item Block -->
      <div class="bg-[#1a1d24] p-6 rounded-2xl border border-zinc-800/50 relative overflow-hidden shadow-lg">
        <div class="flex items-center gap-4 mb-6 relative z-10">
          <div class="w-16 h-16 bg-[#22262f] rounded-xl flex items-center justify-center p-2 shadow-inner">
            <img src="https://render.albiononline.com/v1/item/T5_MAIN_DAGGER.png" class="w-full h-full object-contain drop-shadow-[0_0_8px_rgba(255,255,255,0.2)]" />
          </div>
          <div>
            <h3 class="text-xl font-black text-amber-500 tracking-wide">Sangra-letra</h3>
            <p class="text-xs text-zinc-400 font-bold uppercase tracking-widest mt-0.5">Assassino / Combate Corpo-a-Corpo</p>
          </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 relative z-10">
          <!-- Enchantment Card T4.0 -->
          <div class="bg-gradient-to-br from-[#22262f] to-[#1a1d24] p-4 rounded-xl border border-zinc-700/50 hover:border-amber-500/50 transition-all cursor-pointer group">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-black text-white bg-zinc-800 px-2 py-0.5 rounded">T4.0</span>
              <span class="text-[10px] text-zinc-500 group-hover:text-primary transition-colors">Normal</span>
            </div>
            <div class="text-lg font-black text-white group-hover:text-primary transition-colors">45.000 <span class="text-[10px] text-zinc-500 font-normal">Prata</span></div>
            <div class="text-[9px] text-zinc-500 mt-2 flex items-center gap-1"><span class="material-symbols-outlined text-[12px]">schedule</span> 5 min atrás</div>
          </div>
          <!-- Enchantment Card T4.1 -->
          <div class="bg-gradient-to-br from-[#22262f] to-[#1a1d24] p-4 rounded-xl border border-[#10b981]/30 hover:border-[#10b981] transition-all cursor-pointer group">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-black text-[#10b981] bg-[#10b981]/10 px-2 py-0.5 rounded">T4.1</span>
            </div>
            <div class="text-lg font-black text-white group-hover:text-[#10b981] transition-colors">52.190 <span class="text-[10px] text-zinc-500 font-normal">Prata</span></div>
            <div class="text-[9px] text-zinc-500 mt-2">12 min atrás</div>
          </div>
          <!-- Enchantment Card T4.2 -->
          <div class="bg-gradient-to-br from-[#22262f] to-[#1a1d24] p-4 rounded-xl border border-blue-500/30 hover:border-blue-500 transition-all cursor-pointer group">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-black text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded">T4.2</span>
            </div>
            <div class="text-lg font-black text-white group-hover:text-blue-400 transition-colors">71.000 <span class="text-[10px] text-zinc-500 font-normal">Prata</span></div>
            <div class="text-[9px] text-zinc-500 mt-2">Atual</div>
          </div>
          <!-- Enchantment Card T4.3 -->
          <div class="bg-gradient-to-br from-[#22262f] to-[#1a1d24] p-4 rounded-xl border border-purple-500/30 hover:border-purple-500 transition-all cursor-pointer group">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-black text-purple-400 bg-purple-500/10 px-2 py-0.5 rounded">T4.3</span>
            </div>
            <div class="text-lg font-black text-white group-hover:text-purple-400 transition-colors">105.000 <span class="text-[10px] text-zinc-500 font-normal">Prata</span></div>
            <div class="text-[9px] text-zinc-500 mt-2">1 hora atrás</div>
          </div>
           <!-- Enchantment Card T4.4 -->
          <div class="bg-gradient-to-br from-[#22262f] to-[#1a1d24] p-4 rounded-xl border border-amber-500/30 hover:border-amber-500 transition-all cursor-pointer group opacity-60 hover:opacity-100">
            <div class="flex justify-between items-start mb-3">
              <span class="text-xs font-black text-amber-500 bg-amber-500/10 px-2 py-0.5 rounded">T4.4</span>
            </div>
            <div class="text-lg font-black text-white group-hover:text-amber-500 transition-colors">Sem Dados</div>
            <div class="text-[9px] text-zinc-500 mt-2">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
